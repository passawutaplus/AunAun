# So1o + an1hem + Ops Hub on a VPS — no Lovable hosting.
# 1. Copy .env.vps.example → .env and fill values
# 2. Edit deploy/nginx/default.conf (server_name → your domains)
# 3. docker compose up --build -d

services:
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/502.html:/etc/nginx/custom/502.html:ro
    depends_on:
      solo:
        condition: service_started
      anthem:
        condition: service_started
      ops-hub:
        condition: service_started
    restart: unless-stopped

  solo:
    build:
      context: ./Solo-Code
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID:-}
        VITE_EARLY_ACCESS: ${VITE_EARLY_ACCESS:-false}
        VITE_PAYMENTS_CLIENT_TOKEN: ${VITE_PAYMENTS_CLIENT_TOKEN:-}
        VITE_ANTHEM_APP_URL: ${VITE_ANTHEM_APP_URL:-http://anthem.example.com}
        VITE_OPS_HUB_URL: ${VITE_OPS_HUB_URL:-https://hq.solofreelancer.com}
    env_file:
      - ./Solo-Code/.env
      - ./.env
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    restart: unless-stopped

  anthem:
    build:
      context: ./Anthem-Code
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${ANTHEM_VITE_SUPABASE_URL:-${VITE_SUPABASE_URL}}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${ANTHEM_VITE_SUPABASE_PUBLISHABLE_KEY:-${VITE_SUPABASE_PUBLISHABLE_KEY}}
        VITE_SUPABASE_PROJECT_ID: ${ANTHEM_VITE_SUPABASE_PROJECT_ID:-${VITE_SUPABASE_PROJECT_ID:-}}
        VITE_SO1O_APP_URL: ${VITE_SO1O_APP_URL:-http://solo.example.com}
        VITE_LEGAL_WEBSITE: ${VITE_ANTHEM_APP_URL:-http://anthem.example.com}
        VITE_OPS_HUB_URL: ${VITE_OPS_HUB_URL:-https://hq.solofreelancer.com}
        VITE_DEMO_MODE: ${VITE_DEMO_MODE:-true}
    env_file:
      - ./Anthem-Code/.env
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  ops-hub:
    build:
      context: ./Ops-Hub
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID:-rvnzjiskqliexysicfmh}
        VITE_SO1O_APP_URL: ${VITE_SO1O_APP_URL:-https://www.solofreelancer.com}
        VITE_ANTHEM_APP_URL: ${VITE_ANTHEM_APP_URL:-https://an1hem.app}
        VITE_SITE_URL: ${VITE_OPS_HUB_URL:-https://hq.solofreelancer.com}
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
