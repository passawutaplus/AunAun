<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} · A+ Vault</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{CSS_HREF}}" />
  <style>
    .vault-error-page{
      min-height:100vh;margin:0;display:grid;place-items:center;padding:32px 20px;
      font-family:"Agrandir Wide","IBM Plex Sans Thai","IBM Plex Sans",ui-sans-serif,sans-serif;
      color:#201410;background:
        radial-gradient(ellipse 90% 70% at 18% 12%, rgba(255,214,130,.55), transparent 55%),
        radial-gradient(ellipse 80% 60% at 88% 18%, rgba(255,120,70,.45), transparent 50%),
        radial-gradient(ellipse 70% 55% at 70% 88%, rgba(255,79,67,.38), transparent 55%),
        linear-gradient(145deg, #fff4e8 0%, #ffd7b8 28%, #ff9a6b 58%, #ff5a3c 82%, #e83a2a 100%);
      overflow:hidden;position:relative;
    }
    .vault-error-page::before{
      content:"";position:absolute;inset:-20%;
      background:
        radial-gradient(circle at 30% 40%, rgba(255,255,255,.24), transparent 28%),
        radial-gradient(circle at 72% 62%, rgba(255,230,170,.2), transparent 32%);
      animation:vaultErrorGlow 10s ease-in-out infinite alternate;
      pointer-events:none;
    }
    @keyframes vaultErrorGlow{from{transform:translate3d(-2%,-1%,0) scale(1)}to{transform:translate3d(2%,1.5%,0) scale(1.05)}}
    .vault-error-art{
      position:relative;z-index:1;width:min(720px,100%);text-align:center;
      display:grid;gap:18px;justify-items:center;
    }
    .vault-error-orb{
      width:min(280px,70vw);aspect-ratio:1;border-radius:50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.9), transparent 28%),
        radial-gradient(circle at 60% 70%, rgba(255,79,67,.65), transparent 45%),
        radial-gradient(circle at 50% 50%, #ffb070, #ff5a3c 58%, #c92218);
      box-shadow:
        0 0 0 14px rgba(255,255,255,.14),
        0 30px 80px rgba(180,40,20,.35),
        inset 0 -24px 40px rgba(120,20,10,.28);
      position:relative;isolation:isolate;
    }
    .vault-error-orb::after{
      content:"";position:absolute;inset:18%;border-radius:inherit;
      border:1px solid rgba(255,255,255,.35);
      box-shadow:inset 0 0 40px rgba(255,255,255,.18);
    }
    .vault-error-code{
      margin:0;font-size:clamp(72px,16vw,140px);font-weight:300;line-height:.85;
      letter-spacing:.02em;color:#1a1210;
      text-shadow:0 10px 40px rgba(255,255,255,.35);
    }
    .vault-error-title{
      margin:0;font-size:clamp(24px,4vw,36px);font-weight:300;letter-spacing:.01em;
    }
    .vault-error-copy{
      margin:0;max-width:42ch;font-family:"IBM Plex Sans Thai","IBM Plex Sans",sans-serif;
      font-size:15px;font-weight:400;line-height:1.55;color:rgba(32,20,16,.78);
    }
    .vault-error-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:6px}
    .vault-error-actions a{
      display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 18px;
      border-radius:999px;text-decoration:none;font-family:"IBM Plex Sans",sans-serif;font-size:14px;font-weight:500;
    }
    .vault-error-actions .primary{
      background:#1a1210;color:#fff8f2;
      box-shadow:0 12px 30px rgba(40,18,12,.28);
    }
    .vault-error-actions .ghost{
      background:rgba(255,255,255,.42);color:#1a1210;border:1px solid rgba(255,255,255,.55);
      backdrop-filter:blur(8px);
    }
    .vault-error-mark{
      position:absolute;top:22px;left:22px;z-index:2;
      width:40px;height:40px;border-radius:10px;display:grid;place-items:center;
      background:rgba(26,18,16,.92);color:#fff;font-weight:600;font-size:13px;
      text-decoration:none;
    }
    @media (prefers-reduced-motion:reduce){
      .vault-error-page::before{animation:none}
    }
  </style>
</head>
<body class="vault-error-page" data-error="{{CODE}}">
  <a class="vault-error-mark" href="{{HOME_HREF}}" aria-label="A+ Vault">A+</a>
  <main class="vault-error-art">
    <div class="vault-error-orb" aria-hidden="true"></div>
    <p class="vault-error-code">{{CODE}}</p>
    <h1 class="vault-error-title">{{HEADLINE}}</h1>
    <p class="vault-error-copy">{{MESSAGE}}</p>
    <div class="vault-error-actions">
      <a class="primary" href="{{HOME_HREF}}">Back to Vault</a>
      <a class="ghost" href="{{HOME_HREF}}">Open library</a>
    </div>
  </main>
</body>
</html>
