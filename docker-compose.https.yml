# Use with: docker compose -f docker-compose.yml -f docker-compose.https.yml up -d
# Requires DNS A records → VPS and ports 80/443 open.

services:
  proxy:
    ports: []

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      proxy:
        condition: service_started
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
