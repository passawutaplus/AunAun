name: Anthem-Code tests

on:
  push:
    paths:
      - "Anthem-Code/**"
      - ".github/workflows/anthem-code-test.yml"
  pull_request:
    paths:
      - "Anthem-Code/**"

defaults:
  run:
    working-directory: Anthem-Code

jobs:
  unit-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm ci

      - name: Sync ecosystem shared modules
        run: node ../Solo-Code/scripts/vendor-ecosystem-shared.mjs

      - name: Check vendored files are committed
        run: git diff --exit-code src/lib/safeUrl.ts src/lib/lineNotificationKinds.vendored.ts src/data/plans.vendored.ts

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true

      - name: Production build env guard
        run: DEPLOY_TARGET=production VITE_DEMO_MODE=false node scripts/check-build-env.mjs

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ci_publishable_key

      - name: service_role bundle guard
        run: |
          if grep -r 'service_role' dist/; then
            echo "FAIL: service_role found in client bundle"
            exit 1
          fi
          echo "OK: no service_role in dist/"

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Public smoke (curl)
        run: BASE_URL=https://aplus1-demo.vercel.app npm run smoke:public

  security-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Security smoke (Playwright)
        run: >
          npx playwright test e2e/smoke/public.smoke.spec.ts
          --project=smoke
          --grep "legal pages|security headers|no service_role"
        env:
          CI: true
          VITE_SITE_URL: http://127.0.0.1:8080
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ci_publishable_key
          VITE_DEMO_MODE: "true"
          VITE_DEMO_SUPABASE_URL: https://demo.example.supabase.co
          VITE_DEMO_SUPABASE_PUBLISHABLE_KEY: ci_demo_publishable_key

  seo-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: SEO e2e (Playwright)
        run: npm run e2e:seo
        env:
          CI: true
          E2E_NO_SERVER: "1"
          E2E_BASE_URL: https://aplus1-demo.vercel.app
