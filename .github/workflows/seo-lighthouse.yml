name: SEO Lighthouse (scheduled)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Lighthouse performance + SEO
        run: node scripts/performance/run-performance.mjs
        env:
          PX_BASE_URL: https://1px-demo.vercel.app
          SO1O_BASE_URL: https://solofreelancer.com
          LH_SEO_MIN: "80"

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: scripts/performance/results/
          if-no-files-found: ignore
