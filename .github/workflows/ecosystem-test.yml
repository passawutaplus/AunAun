name: Ecosystem test gate

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run ecosystem gate
        run: bash scripts/test-ecosystem-full.sh
        env:
          SOLO_BASE_URL: https://solofreelancer.com
          ANTHEM_BASE_URL: https://aplus1-demo.vercel.app
          HUB_URL: skip
