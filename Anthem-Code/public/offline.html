<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Aplus1 - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        color: #171717;
        background: #fafafa;
        font-family: system-ui, sans-serif;
      }
      main { max-width: 420px; text-align: center; }
      img { width: 72px; height: 72px; border-radius: 16px; }
      h1 { font-size: 22px; margin: 20px 0 8px; }
      p { color: #666; line-height: 1.6; }
      button {
        border: 0;
        border-radius: 8px;
        padding: 11px 18px;
        color: white;
        background: #171717;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" />
      <h1>ยังเชื่อมต่ออินเทอร์เน็ตไม่ได้</h1>
      <p>ตรวจสอบสัญญาณแล้วลองอีกครั้ง ข้อมูลส่วนตัวและข้อความจะไม่ถูกเก็บไว้ใน offline cache</p>
      <button type="button" onclick="location.reload()">ลองอีกครั้ง</button>
    </main>
  </body>
</html>
