# Shared security headers for VPS nginx reverse proxy / static SPAs.
# CSP for So1o SSR is set in Solo-Code/src/start.ts — do not duplicate here on solo host.

add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()" always;
add_header X-Frame-Options "DENY" always;
