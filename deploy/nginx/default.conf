# Replace server_name with your VPS domains (or use one host + path routing below).

upstream anthem_app {
    server anthem:80;
}

upstream solo_app {
    server solo:3000;
}

upstream ops_hub_app {
    server ops-hub:80;
}

# --- Subdomain routing (recommended) ---
server {
    listen 80;
    server_name anthem.example.com an1hem.example.com an1hem.app www.an1hem.app;

    location / {
        proxy_pass http://anthem_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name solo.example.com so1o.example.com solofreelancer.com www.solofreelancer.com;

    location / {
        proxy_pass http://solo_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name hq.solofreelancer.com hq.example.com;

    location / {
        proxy_pass http://ops_hub_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

