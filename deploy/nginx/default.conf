# Per-app upstreams — failure isolated per hostname (max_fails marks backend down briefly).

limit_req_zone $binary_remote_addr zone=solo_api:10m rate=60r/m;
limit_req_status 429;

upstream anthem_app {
    server anthem:80 max_fails=2 fail_timeout=10s;
}

upstream solo_app {
    server solo:3000 max_fails=2 fail_timeout=10s;
}

upstream ops_hub_app {
    server ops-hub:80 max_fails=2 fail_timeout=10s;
}

# Shared error page (mounted at /etc/nginx/custom/502.html)
error_page 502 503 /502.html;

# --- an1hem ---
server {
    listen 80;
    server_name anthem.example.com an1hem.example.com an1hem.app www.an1hem.app;

    include /etc/nginx/conf.d/security-headers.conf;

    location = /502.html {
        root /etc/nginx/custom;
        internal;
    }

    location / {
        proxy_pass http://anthem_app;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 = /502.html;
    }
}

# --- So1o ---
server {
    listen 80;
    server_name solo.example.com so1o.example.com solofreelancer.com www.solofreelancer.com;

    include /etc/nginx/conf.d/security-headers.conf;

    location = /502.html {
        root /etc/nginx/custom;
        internal;
    }

    location /api/ {
        limit_req zone=solo_api burst=20 nodelay;
        proxy_pass http://solo_app;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 = /502.html;
    }

    location / {
        proxy_pass http://solo_app;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 = /502.html;
    }
}

# --- Ops Hub ---
server {
    listen 80;
    server_name hq.solofreelancer.com hq.example.com;

    include /etc/nginx/conf.d/security-headers.conf;

    location = /502.html {
        root /etc/nginx/custom;
        internal;
    }

    location / {
        proxy_pass http://ops_hub_app;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 = /502.html;
    }
}
